name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (for example v1.0.1)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || github.ref || inputs.tag }}
  cancel-in-progress: true

jobs:
  build-release:
    name: Build & Release
    runs-on: macos-15
    env:
      PROJECT_PATH: Reader for Language Learner/Reader for Language Learner.xcodeproj
      SCHEME_NAME: Reader for Language Learner
      DERIVED_DATA_PATH: ./DerivedData
      TEST_RESULTS_PATH: ./TestResults.xcresult

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"

      - name: Resolve tag and version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RAW_TAG="${{ inputs.tag }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            RAW_TAG="${{ github.event.release.tag_name }}"
          else
            RAW_TAG="${{ github.ref_name }}"
          fi

          VERSION="${RAW_TAG#v}"

          echo "RAW_TAG=$RAW_TAG" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $RAW_TAG"
          echo "Resolved version: $VERSION"

      - name: Build Release
        run: |
          xcodebuild build \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME_NAME" \
            -destination 'platform=macOS' \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION=${{ steps.version.outputs.VERSION }} \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            IPHONEOS_DEPLOYMENT_TARGET=15.0

      - name: Run Unit Tests
        run: |
          rm -rf "$TEST_RESULTS_PATH"
          xcodebuild test \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME_NAME" \
            -destination 'platform=macOS' \
            -configuration Debug \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -parallel-testing-enabled NO \
            -only-testing:"Reader for Language LearnerTests" \
            -resultBundlePath "$TEST_RESULTS_PATH" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            IPHONEOS_DEPLOYMENT_TARGET=15.0

      - name: Create DMG and ZIP
        shell: bash
        run: |
          APP_PATH="$DERIVED_DATA_PATH/Build/Products/Release/Reader for Language Learner.app"
          if [[ ! -d "$APP_PATH" ]]; then
            echo "App bundle not found at $APP_PATH"
            find "$DERIVED_DATA_PATH" -maxdepth 4 -type d -name "*.app" || true
            exit 1
          fi

          DMG_NAME="RELL-${{ steps.version.outputs.VERSION }}-macOS"

          rm -rf dmg_contents
          mkdir -p dmg_contents
          cp -R "$APP_PATH" dmg_contents/
          ln -s /Applications dmg_contents/Applications

          hdiutil create \
            -volname "RELL" \
            -srcfolder dmg_contents \
            -ov \
            -format UDZO \
            "${DMG_NAME}.dmg"

          ditto -c -k --keepParent "$APP_PATH" "${DMG_NAME}.zip"

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ steps.version.outputs.VERSION }}
          path: |
            RELL-${{ steps.version.outputs.VERSION }}-macOS.dmg
            RELL-${{ steps.version.outputs.VERSION }}-macOS.zip
            ${{ env.TEST_RESULTS_PATH }}
          if-no-files-found: warn
          retention-days: 7

      - name: Create or update GitHub Release
        if: github.event_name != 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.RAW_TAG }}
          name: RELL v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          body: |
            ## RELL v${{ steps.version.outputs.VERSION }}

            ### Installation
            1. Download `RELL-${{ steps.version.outputs.VERSION }}-macOS.dmg`
            2. Open the DMG file
            3. Drag **Reader for Language Learner** to Applications
            4. On first launch: Right-click > Open (macOS Gatekeeper bypass for unsigned apps)

            ### Requirements
            - macOS 15 (Sequoia) or later
            - LM Studio, Ollama, or an OpenAI/Anthropic API key for LLM features

            > **Note:** This app is not code-signed with an Apple Developer certificate.
            > macOS will show a warning on first launch. Use Right-click > Open to bypass.
          files: |
            RELL-${{ steps.version.outputs.VERSION }}-macOS.dmg
            RELL-${{ steps.version.outputs.VERSION }}-macOS.zip
          fail_on_unmatched_files: true
