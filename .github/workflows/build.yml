name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project "Reader for Language Learner/Reader for Language Learner.xcodeproj" \
            -scheme "Reader for Language Learner" \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            IPHONEOS_DEPLOYMENT_TARGET=15.0 \
            | xcpretty --color

      - name: Build Result
        if: failure()
        run: |
          xcodebuild build \
            -project "Reader for Language Learner/Reader for Language Learner.xcodeproj" \
            -scheme "Reader for Language Learner" \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            IPHONEOS_DEPLOYMENT_TARGET=15.0 \
            2>&1 | tail -50
